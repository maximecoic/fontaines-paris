<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Fontaines Paris — Trouver de l'eau potable</title>
<meta name="description" content="Carte des fontaines à boire de Paris (Eau de Paris), en temps réel, à partir des données ouvertes de la Ville de Paris.">

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<meta id="meta-theme-color" name="theme-color" content="#0B63C5">

<!-- iOS : Ajouter à l'écran d'accueil -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fontaines">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="./icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">

<link rel="icon" href="./icons/favicon.ico" sizes="any">
<link rel="icon" href="./icons/icon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="./icons/icon-16.png" type="image/png" sizes="16x16">

<link rel="stylesheet" href="./vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="./vendor/markercluster/MarkerCluster.css">
<link rel="stylesheet" href="./vendor/markercluster/MarkerCluster.Default.css">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="map"></div>

<!-- Overlay shown while first data load is in progress -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-card">
    <span class="spinner" aria-hidden="true"></span>
    <p>Recherche des points d'eau à Paris…</p>
  </div>
</div>

<!-- Floating top card: brand + search + filters -->
<div class="top-card" id="top-card">
  <div class="brand-row">
    <img class="brand-logo" src="./icons/icon-96.png" alt="" width="30" height="30">
    <div class="brand-text">
      <strong>Fontaines Paris</strong>
      <span id="stats-line" class="stats-line">Chargement des données…</span>
    </div>
    <button class="icon-btn" id="theme-toggle" type="button" aria-label="Changer l'apparence de la carte">
      <svg id="theme-icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg id="theme-icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <label class="search-box" for="search-input">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search-input" type="search" inputmode="search" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Rechercher une rue, un quartier…">
    <button class="clear-btn" id="search-clear" type="button" aria-label="Effacer la recherche" hidden>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </label>

  <div class="chip-row">
    <button class="chip" id="filter-available" type="button" aria-pressed="false">
      <span class="chip-dot"></span> Disponibles uniquement
    </button>
  </div>
</div>

<!-- Floating action buttons -->
<div class="fab-stack" id="fab-stack">
  <button class="fab" id="locate-btn" type="button" aria-label="Me localiser et trouver les fontaines les plus proches">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M22 12h-3M5 12H2M19.07 4.93l-2.12 2.12M7.05 16.95l-2.12 2.12M19.07 19.07l-2.12-2.12M7.05 7.05 4.93 4.93"/></svg>
  </button>
  <button class="fab" id="zoom-in-btn" type="button" aria-label="Zoomer">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <button class="fab" id="zoom-out-btn" type="button" aria-label="Dézoomer">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"/></svg>
  </button>
</div>

<!-- Bottom sheet: stats / search results / nearest fountains -->
<section class="sheet" id="sheet" data-state="collapsed">
  <button class="sheet-header" id="sheet-header" type="button" aria-expanded="false">
    <span class="sheet-handle-bar" aria-hidden="true"></span>
    <span class="sheet-peek-row">
      <span id="sheet-peek-text">Chargement…</span>
      <svg class="chevron" id="sheet-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
    </span>
  </button>
  <div class="sheet-content" id="sheet-content">
    <p class="sheet-empty">Recherchez une adresse ou touchez <strong>Me localiser</strong> pour voir les fontaines les plus proches.</p>
  </div>
</section>

<div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

<script src="./vendor/leaflet/leaflet.js"></script>
<script src="./vendor/markercluster/leaflet.markercluster.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
